<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardpool | 鑑定擴散框購買</title>
    <link rel="stylesheet" href="/static/liff/style.css?v=2">
    <style>
        .page-header { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); padding:20px; display:flex; align-items:center; gap:12px; }
        .back-btn { background:rgba(255,255,255,.15); border:none; border-radius:8px; padding:8px 12px; cursor:pointer; font-size:.85rem; color:#fff; font-weight:600; text-decoration:none; }
        .page-header h1 { font-size:1.1rem; font-weight:700; color:#be9682; }
        .page-header p { font-size:.75rem; color:rgba(255,255,255,.6); margin-top:2px; }

        .official-badge { margin:12px 12px 0; background:#f5ede8; border:1px solid #be9682; border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:8px; font-size:.82rem; color:#e65100; font-weight:600; }

        .items-grid { padding:12px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .item-card { background:#fff; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.08); overflow:hidden; cursor:pointer; transition:transform .2s; }
        .item-card:hover { transform:translateY(-2px); }
        .item-img { width:100%; aspect-ratio:1; background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:2.5rem; overflow:hidden; }
        .item-img img { width:100%; height:100%; object-fit:cover; }
        .item-body { padding:10px; }
        .item-title { font-size:.88rem; font-weight:700; line-height:1.3; }
        .item-price { font-size:1rem; font-weight:800; color:#e65100; margin-top:4px; }
        .item-stock { font-size:.72rem; color:#aaa; margin-top:2px; }

        /* Modal */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; align-items:flex-end; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-sheet { background:#fff; width:100%; max-width:500px; border-radius:20px 20px 0 0; padding:24px 20px 32px; }
        .modal-img { width:100%; max-height:200px; object-fit:contain; background:#f5f5f5; border-radius:12px; margin-bottom:16px; display:flex; align-items:center; justify-content:center; font-size:4rem; }
        .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:6px; }
        .modal-desc { font-size:.85rem; color:#666; line-height:1.6; margin-bottom:12px; }
        .modal-price { font-size:1.4rem; font-weight:800; color:#e65100; margin-bottom:16px; }

        .qty-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .qty-row label { font-size:.85rem; color:#666; font-weight:600; }
        .qty-ctrl { display:flex; align-items:center; gap:8px; }
        .qty-btn { width:32px; height:32px; border:1.5px solid #eee; border-radius:8px; background:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .qty-btn:hover { border-color:#be9682; }
        .qty-val { min-width:28px; text-align:center; font-weight:700; font-size:1rem; }

        .notes-field { width:100%; border:1.5px solid #eee; border-radius:10px; padding:10px; font-size:.88rem; font-family:inherit; resize:none; height:70px; outline:none; margin-bottom:16px; }
        .notes-field:focus { border-color:#be9682; }

        .order-btn { width:100%; padding:14px; background:#be9682; border:none; border-radius:12px; font-size:1rem; font-weight:700; color:#1a1a2e; cursor:pointer; }
        .order-btn:disabled { opacity:.5; cursor:not-allowed; }
        .close-btn { position:absolute; top:16px; right:16px; background:none; border:none; font-size:1.4rem; cursor:pointer; color:#999; }

        .success-box { background:#e8f5e9; border-radius:12px; padding:16px; text-align:center; color:#2e7d32; font-weight:600; margin-bottom:12px; display:none; }
        .error-box { background:#ffebee; border-radius:12px; padding:12px; color:#c62828; font-size:.85rem; margin-bottom:12px; display:none; }

        .empty { text-align:center; padding:60px 20px; color:#bbb; font-size:.9rem; }
        .loading { text-align:center; padding:40px; color:#bbb; }

        .auth-warn { margin:20px 16px; padding:16px; background:#fff3e0; border-radius:12px; text-align:center; }
        .auth-warn p { color:#e65100; margin-bottom:12px; font-size:.9rem; }
        .auth-warn a { display:inline-block; padding:10px 24px; background:#be9682; border-radius:8px; font-weight:700; color:#1a1a1a; text-decoration:none; }

        .my-orders-link { display:block; text-align:center; padding:10px; font-size:.82rem; color:#1565c0; margin-top:4px; }
    </style>
</head>
<body>
<div class="app">
    <div class="page-header">
        <div>
            <a href="/" class="back-btn">← 首頁</a>
        </div>
        <div>
            <h1>🏆 鑑定擴散框購買</h1>
            <p>官方授權周邊商品</p>
        </div>
    </div>

    <div class="official-badge">
        🛡️ 本頁商品均由 Cardpool 官方上架，品質保證
    </div>

    <div id="authWarn" class="auth-warn" style="display:none;">
        <p>⚠️ 請先登入才能下單</p>
        <a href="/">前往登入</a>
    </div>

    <div id="loading" class="loading">載入中...</div>
    <div id="itemsGrid" class="items-grid" style="display:none;"></div>
    <div id="emptyState" class="empty" style="display:none;">目前暫無商品，敬請期待</div>

    <a href="#" id="myOrdersLink" class="my-orders-link" style="display:none;" onclick="showMyOrders(); return false;">📦 查看我的訂單</a>
</div>

<!-- Product modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-sheet" style="position:relative;">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="modal-img" id="modalImg">🏆</div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="qty-row">
            <label>數量</label>
            <div class="qty-ctrl">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <span class="qty-val" id="qtyVal">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>
        <textarea class="notes-field" id="orderNotes" placeholder="備註（選填）：送貨地址、特殊需求…"></textarea>
        <div class="success-box" id="successBox"></div>
        <div class="error-box" id="errorBox"></div>
        <button class="order-btn" id="orderBtn" onclick="placeOrder()">立即下單</button>
    </div>
</div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? `${window.location.protocol}//${window.location.hostname}:8000`
  : 'https://cardpool.onrender.com';
let items = [];
let selectedItem = null;
let qty = 1;
let isLoggedIn = false;

function getToken() { return localStorage.getItem('cp_token'); }

async function init() {
    const token = getToken();
    if (token) {
        const r = await fetch(`${API}/api/auth/me`, { headers: { Authorization: 'Bearer ' + token } });
        isLoggedIn = r.ok;
    }
    if (!isLoggedIn) {
        document.getElementById('authWarn').style.display = '';
    } else {
        document.getElementById('myOrdersLink').style.display = '';
    }
    await loadItems();
}

async function loadItems() {
    try {
        const r = await fetch(`${API}/api/shop/items`);
        const d = await r.json();
        items = d.items || [];
        document.getElementById('loading').style.display = 'none';
        if (!items.length) {
            document.getElementById('emptyState').style.display = '';
        } else {
            renderItems();
        }
    } catch(e) {
        document.getElementById('loading').textContent = '載入失敗：' + e.message;
    }
}

function renderItems() {
    const grid = document.getElementById('itemsGrid');
    grid.style.display = 'grid';
    grid.innerHTML = '';
    items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'item-card';
        const imgContent = item.image_url
            ? `<img src="${item.image_url}" alt="${item.title}">`
            : '🏆';
        el.innerHTML = `
            <div class="item-img">${imgContent}</div>
            <div class="item-body">
                <div class="item-title">${item.title}</div>
                <div class="item-price">NT$ ${Number(item.price_twd).toLocaleString()}</div>
                <div class="item-stock">庫存：${item.stock} 件</div>
            </div>
        `;
        el.onclick = () => openModal(item);
        grid.appendChild(el);
    });
}

function openModal(item) {
    selectedItem = item;
    qty = 1;
    document.getElementById('qtyVal').textContent = 1;
    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalDesc').textContent = item.description || '';
    document.getElementById('modalPrice').textContent = `NT$ ${Number(item.price_twd).toLocaleString()}`;
    document.getElementById('orderNotes').value = '';
    document.getElementById('successBox').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';

    const imgEl = document.getElementById('modalImg');
    if (item.image_url) {
        imgEl.innerHTML = `<img src="${item.image_url}" alt="${item.title}" style="width:100%;max-height:200px;object-fit:contain;border-radius:12px;">`;
    } else {
        imgEl.textContent = '🏆';
    }

    const btn = document.getElementById('orderBtn');
    btn.disabled = !isLoggedIn;
    btn.textContent = isLoggedIn ? '立即下單' : '請先登入';

    document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open');
    }
}

function changeQty(delta) {
    if (!selectedItem) return;
    qty = Math.max(1, Math.min(selectedItem.stock, qty + delta));
    document.getElementById('qtyVal').textContent = qty;
}

async function placeOrder() {
    if (!isLoggedIn || !selectedItem) return;
    const btn = document.getElementById('orderBtn');
    btn.disabled = true;
    btn.textContent = '下單中...';
    document.getElementById('errorBox').style.display = 'none';

    try {
        const r = await fetch(`${API}/api/shop/orders`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
            body: JSON.stringify({ item_id: selectedItem.id, qty, notes: document.getElementById('orderNotes').value })
        });
        const d = await r.json();
        if (!r.ok) {
            document.getElementById('errorBox').textContent = d.detail || '下單失敗';
            document.getElementById('errorBox').style.display = '';
            btn.disabled = false;
            btn.textContent = '立即下單';
        } else {
            document.getElementById('successBox').textContent = `✅ 下單成功！訂單 #${d.order_id}，合計 NT$${Number(d.total_price_twd).toLocaleString()}`;
            document.getElementById('successBox').style.display = '';
            btn.textContent = '已下單';
            // Update local stock
            const local = items.find(i => i.id === selectedItem.id);
            if (local) { local.stock -= qty; renderItems(); }
        }
    } catch(e) {
        document.getElementById('errorBox').textContent = '網路錯誤：' + e.message;
        document.getElementById('errorBox').style.display = '';
        btn.disabled = false;
        btn.textContent = '立即下單';
    }
}

async function showMyOrders() {
    const r = await fetch(`${API}/api/me/shop-orders`, { headers: { Authorization: 'Bearer ' + getToken() } });
    const d = await r.json();
    const orders = d.orders || [];
    if (!orders.length) return alert('目前沒有訂單紀錄');
    const lines = orders.map(o => `#${o.id} ${o.title} x${o.qty} NT$${o.total_price_twd} [${o.status}]`).join('\n');
    alert('我的訂單：\n\n' + lines);
}

init();
</script>
<script src="/static/liff/nav.js"></script>
</body>
</html>
