<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardpool | 系列卡片</title>
    <link rel="stylesheet" href="/static/liff/style.css">
    <style>
        .header {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 12px;
        }
        .header h1 {
            flex: 1;
            font-size: 16px;
            margin: 0;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
        }
        .card-item {
            aspect-ratio: 0.72;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card-item:hover {
            transform: scale(1.05);
        }
        .card-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .set-info {
            padding: 12px;
            background: #f9f9f9;
            text-align: center;
        }
        .set-info h2 {
            margin: 0 0 4px 0;
            font-size: 18px;
        }
        .set-info p {
            margin: 0;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1 id="setTitle">載入中...</h1>
            <a href="/" class="home-btn" title="回首頁">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-7H10v7H6a2 2 0 0 1-2-2V9z"/></svg>
                首頁
            </a>
        </header>

        <div id="setInfo" class="set-info" style="display:none;">
            <h2 id="setName"></h2>
            <p id="setMeta"></p>
        </div>

        <div id="loading" class="loading">載入卡片中...</div>

        <div id="cardsGrid" class="cards-grid" style="display:none;"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const setId = params.get('id');

            if (!setId) {
                document.getElementById('loading').textContent = '找不到系列';
                return;
            }

            // 從 localStorage 取得系列資訊
            const savedSet = localStorage.getItem('selectedSet');
            if (savedSet) {
                const set = JSON.parse(savedSet);
                const isJp = (set.set_id || set.id || setId).startsWith('jp-');
                const primary = (isJp ? set.name_jp : set.name) || set.name || set.name_jp || setId;
                const zh = set.name_zh && set.name_zh !== primary ? set.name_zh : null;
                const display = primary + (zh ? ` (${zh})` : '');
                document.getElementById('setTitle').textContent = display;
                document.getElementById('setName').textContent = display;
                document.getElementById('setMeta').textContent = `${set.series || ''} | ${set.total_cards || '?'} 張卡片`;
                document.getElementById('setInfo').style.display = 'block';
            } else {
                document.getElementById('setTitle').textContent = setId;
            }

            loadCards(setId);
        });

        async function loadCards(setId) {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('cardsGrid');
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang') || 'jp';

            try {
                let cards = [];

                if (lang === 'jp') {
                    // 日文：從本地資料庫取得
                    const response = await fetch(`${API_BASE}/api/cardlist/sets/${setId}`, {
                        headers: { 'ngrok-skip-browser-warning': '1' }
                    });
                    const data = await response.json();
                    cards = (data.cards || []).map(c => ({
                        id: c.id,
                        name: c.name_zh || c.name || c.name_jp,
                        number: c.card_number,
                        set: { id: c.set_id, name: c.set_name },
                        images: {
                            large: c.image_url,
                            small: c.image_url
                        },
                        // 保留原始資料供價格查詢用
                        _raw: c
                    }));
                } else {
                    // 英文：從 Pokemon TCG API 取得
                    const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&orderBy=number&pageSize=100`);
                    const data = await response.json();
                    cards = data.data || [];
                }

                loading.style.display = 'none';
                grid.style.display = 'grid';

                renderCards(cards);
            } catch (error) {
                loading.textContent = '載入失敗: ' + error.message;
            }
        }

        function renderCards(cards) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';

            if (cards.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999;">沒有卡片資料</div>';
                return;
            }

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-item';

                const imageUrl = card.images?.large || card.images?.small || 'https://via.placeholder.com/200x280?text=No+Image';

                cardEl.innerHTML = `<img src="${imageUrl}" alt="${card.name}" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/200x280?text=${card.number || 'Card'}'">`;

                cardEl.addEventListener('click', () => {
                    // 儲存卡片資訊並跳轉到價格頁
                    const setId = card.set?.id || card._raw?.set_id || '';
                    const cardNumber = card.number || card._raw?.card_number || '';
                    const cardName = card.name || '';
                    const searchQuery = `${cardName} ${setId} ${cardNumber}`;

                    localStorage.setItem('selectedCard', JSON.stringify({
                        query: searchQuery,
                        officialImage: imageUrl,
                        officialName: cardName,
                        officialSet: card.set?.name || setId,
                        cardNumber: cardNumber,
                        setId: setId,
                        results: [],
                        snkrdunk: [],
                        _raw: card._raw
                    }));

                    window.location.href = `/static/liff/card.html?set=${encodeURIComponent(setId)}&number=${encodeURIComponent(cardNumber)}&q=${encodeURIComponent(searchQuery)}`;
                });

                grid.appendChild(cardEl);
            });
        }
    </script>
</body>
</html>
