<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardpool | 登入 / 註冊</title>
    <link rel="stylesheet" href="/static/liff/style.css?v=2">
    <style>
        .login-header {
            background: var(--bg-outer, #f0ebe5);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            font-size: .95rem;
            color: #888;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn:hover { color: #be9682; }
        .login-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .auth-card {
            background: #fff;
            margin: 16px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        .auth-tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: .95rem;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            transition: all .2s;
            border: none;
            background: #fff;
        }
        .auth-tab.active { color: #333; border-bottom: 3px solid #be9682; }

        .auth-form { padding: 20px; }
        .field-group { margin-bottom: 14px; }
        .field-group label { display: block; font-size: .8rem; color: #666; margin-bottom: 4px; font-weight: 600; }
        .field-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: .95rem;
            outline: none;
            transition: border .2s;
            box-sizing: border-box;
        }
        .field-group input:focus { border-color: #be9682; }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #be9682;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity .2s;
        }
        .btn-primary:hover { opacity: .85; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

        .msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: .88rem; display: none; }
        .msg.ok  { background: #e8f5e9; color: #2e7d32; display: block; }
        .msg.err { background: #ffebee; color: #c62828; display: block; }
        .msg.info{ background: #e3f2fd; color: #1565c0; display: block; }

        .verify-step { display: none; }
        .dev-code-box {
            background: #f5ede8;
            border: 1px solid #be9682;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 12px 0;
            font-size: .88rem;
            color: #555;
        }
        .dev-code-box strong { font-size: 1.4rem; color: #e65100; display: block; margin-top: 4px; letter-spacing: 4px; }
    </style>
</head>
<body>
<div class="app">
    <div class="login-header">
        <a href="/" class="back-btn">← 返回首頁</a>
    </div>

    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">登入</button>
            <button class="auth-tab" onclick="switchTab('register')">註冊</button>
        </div>

        <!-- 登入表單 -->
        <div id="loginForm" class="auth-form">
            <div class="field-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="field-group">
                <label>密碼</label>
                <input type="password" id="loginPassword" placeholder="至少 6 字元" autocomplete="current-password">
            </div>
            <button class="btn-primary" onclick="doLogin()">登入</button>
            <div id="loginMsg" class="msg"></div>
        </div>

        <!-- 註冊表單 -->
        <div id="registerForm" class="auth-form" style="display:none;">
            <!-- Step 1 -->
            <div id="registerStep1" style="display:block;">
                <div class="field-group">
                    <label>暱稱（選填）</label>
                    <input type="text" id="regName" placeholder="顯示名稱">
                </div>
                <div class="field-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="field-group">
                    <label>密碼</label>
                    <input type="password" id="regPassword" placeholder="至少 6 字元" autocomplete="new-password">
                </div>
                <button class="btn-primary" onclick="doRegisterRequest()">寄送驗證碼</button>
                <div id="regMsg1" class="msg"></div>
            </div>

            <!-- Step 2 -->
            <div id="registerStep2" class="verify-step">
                <div id="devCodeBox" class="dev-code-box" style="display:none;">
                    開發模式驗證碼：<strong id="devCode"></strong>
                </div>
                <div class="field-group">
                    <label>驗證碼（6 位數）</label>
                    <input type="text" id="regCode" placeholder="123456" maxlength="6" inputmode="numeric">
                </div>
                <button class="btn-primary" onclick="doRegisterVerify()">完成註冊</button>
                <button class="btn-primary" style="background:#f5f5f5;color:#666;margin-top:8px;" onclick="backToStep1()">← 返回修改</button>
                <div id="regMsg2" class="msg"></div>
            </div>
        </div>
    </div>
</div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? `${window.location.protocol}//${window.location.hostname}:8000`
  : 'https://cardpool.onrender.com';

// 若已登入直接跳首頁
(function() {
    const t = localStorage.getItem('cp_token');
    if (t) window.location.href = '/';
})();

function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((el, i) => {
        el.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
}

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
}

function getToken() { return localStorage.getItem('cp_token'); }
function setToken(t) { localStorage.setItem('cp_token', t); }

async function safeJson(r) {
    try { return await r.json(); }
    catch { return null; }
}

async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showMsg('loginMsg', '請填寫 Email 和密碼', 'err');
    try {
        const r = await fetch(`${API}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const d = await safeJson(r);
        if (!r.ok) return showMsg('loginMsg', d?.detail || '伺服器暫時無法連線，請稍後再試', 'err');
        setToken(d.token);
        window.location.href = '/';
    } catch (e) {
        showMsg('loginMsg', '網路錯誤：' + e.message, 'err');
    }
}

async function doRegisterRequest() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const display_name = document.getElementById('regName').value.trim();
    if (!email || !password) return showMsg('regMsg1', '請填寫 Email 和密碼', 'err');
    try {
        const r = await fetch(`${API}/api/auth/register-request`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, display_name })
        });
        const d = await safeJson(r);
        if (!r.ok) return showMsg('regMsg1', d?.detail || '伺服器暫時無法連線，請稍後再試', 'err');
        document.getElementById('registerStep1').style.display = 'none';
        document.getElementById('registerStep2').style.display = 'block';
        showMsg('regMsg2', d.message || '驗證碼已寄出', 'ok');
        if (d.dev_code) {
            document.getElementById('devCode').textContent = d.dev_code;
            document.getElementById('devCodeBox').style.display = '';
        }
    } catch (e) {
        showMsg('regMsg1', '網路錯誤：' + e.message, 'err');
    }
}

async function doRegisterVerify() {
    const email = document.getElementById('regEmail').value.trim();
    const code = document.getElementById('regCode').value.trim();
    if (!code) return showMsg('regMsg2', '請輸入驗證碼', 'err');
    try {
        const r = await fetch(`${API}/api/auth/register-verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code })
        });
        const d = await safeJson(r);
        if (!r.ok) return showMsg('regMsg2', d?.detail || '伺服器暫時無法連線，請稍後再試', 'err');
        setToken(d.token);
        window.location.href = '/';
    } catch (e) {
        showMsg('regMsg2', '網路錯誤：' + e.message, 'err');
    }
}

function backToStep1() {
    document.getElementById('registerStep1').style.display = 'block';
    document.getElementById('registerStep2').style.display = 'none';
}

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('regCode').addEventListener('keydown', e => { if (e.key === 'Enter') doRegisterVerify(); });
</script>
<script src="/static/liff/nav.js"></script>
</body>
</html>
