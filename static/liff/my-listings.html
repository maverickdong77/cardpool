<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardpool | 我的上架</title>
    <link rel="stylesheet" href="/static/liff/style.css">
    <style>
        .page-header { background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%); padding:20px; display:flex; align-items:center; gap:12px; }
        .back-btn { background:rgba(0,0,0,.1); border:none; border-radius:8px; padding:8px 12px; cursor:pointer; font-size:.85rem; color:#333; font-weight:600; text-decoration:none; }
        .page-header h1 { font-size:1.2rem; font-weight:700; color:#1a1a1a; }

        .status-tabs { display:flex; background:#fff; border-bottom:2px solid #f0f0f0; }
        .status-tab { flex:1; padding:13px; text-align:center; font-size:.88rem; font-weight:600; color:#999; cursor:pointer; border:none; background:#fff; border-bottom:3px solid transparent; transition:all .2s; }
        .status-tab.active { color:#333; border-bottom-color:#FFD700; }

        .listing-list { padding:12px; display:flex; flex-direction:column; gap:10px; }
        .listing-card { background:#fff; border-radius:14px; box-shadow:0 2px 10px rgba(0,0,0,.07); overflow:hidden; }
        .listing-card.cancelled, .listing-card.sold, .listing-card.expired { opacity:.65; }

        .listing-top { display:flex; gap:12px; padding:14px; }
        .card-thumb { width:52px; height:72px; background:#f5f5f5; border-radius:8px; object-fit:cover; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.6rem; }
        .card-thumb img { width:100%; height:100%; object-fit:cover; border-radius:8px; }

        .listing-info { flex:1; min-width:0; }
        .listing-name { font-size:.95rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .listing-sub { font-size:.78rem; color:#888; margin-top:2px; }
        .listing-price { font-size:1.1rem; font-weight:800; color:#e65100; margin-top:6px; }

        .listing-badges { display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 10px; }
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
        .badge-grade { background:#e8f5e9; color:#2e7d32; }
        .badge-condition { background:#e3f2fd; color:#1565c0; }
        .badge-status-active { background:#fff8e1; color:#f57f17; }
        .badge-status-sold { background:#e8f5e9; color:#2e7d32; }
        .badge-status-cancelled { background:#fce4ec; color:#880e4f; }
        .badge-status-expired { background:#f3e5f5; color:#6a1b9a; }

        .listing-footer { border-top:1px solid #f5f5f5; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
        .expires-text { font-size:.75rem; color:#aaa; }

        .btn-cancel { padding:7px 16px; background:#fff; border:1.5px solid #f44336; border-radius:8px; color:#f44336; font-size:.83rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .btn-cancel:hover { background:#f44336; color:#fff; }
        .btn-cancel:disabled { opacity:.4; cursor:not-allowed; }
        .btn-delete { padding:7px 16px; background:#fff; border:1.5px solid #ccc; border-radius:8px; color:#999; font-size:.83rem; font-weight:600; cursor:pointer; transition:all .2s; }
        .btn-delete:hover { border-color:#f44336; color:#f44336; }

        .empty-state { text-align:center; padding:60px 20px; color:#bbb; }
        .empty-state .icon { font-size:3rem; margin-bottom:12px; }
        .empty-state p { font-size:.9rem; }
        .empty-state a { display:inline-block; margin-top:16px; padding:11px 24px; background:#FFD700; border-radius:10px; font-weight:700; color:#1a1a1a; text-decoration:none; font-size:.9rem; }

        .loading { text-align:center; padding:40px; color:#bbb; font-size:.9rem; }

        .auth-warn { margin:20px 16px; padding:16px; background:#fff3e0; border-radius:12px; text-align:center; }
        .auth-warn p { font-size:.9rem; color:#e65100; margin-bottom:12px; }
        .auth-warn a { display:inline-block; padding:10px 24px; background:#FFD700; border-radius:8px; font-weight:700; color:#1a1a1a; text-decoration:none; }

        .new-listing-btn { margin:12px 12px 0; padding:13px; background:#FFD700; border:none; border-radius:12px; font-size:.95rem; font-weight:700; color:#1a1a1a; cursor:pointer; width:calc(100% - 24px); text-decoration:none; display:block; text-align:center; }
    </style>
</head>
<body>
<div class="app">
    <div class="page-header">
        <a href="/" class="back-btn">← 首頁</a>
        <h1>我的上架</h1>
    </div>

    <div id="authWarn" class="auth-warn" style="display:none;">
        <p>⚠️ 請先登入</p>
        <a href="/">前往登入</a>
    </div>

    <div id="mainContent" style="display:none;">
        <a href="/static/liff/listing.html" class="new-listing-btn">＋ 新增上架</a>

        <div class="status-tabs">
            <button class="status-tab active" onclick="switchTab('active')">上架中</button>
            <button class="status-tab" onclick="switchTab('sold')">已售出</button>
            <button class="status-tab" onclick="switchTab('ended')">已結束</button>
        </div>

        <div id="loading" class="loading">載入中...</div>
        <div id="listingList" class="listing-list" style="display:none;"></div>
    </div>
</div>

<script>
const API = window.location.origin;
let allListings = [];
let currentTab = 'active';

const CONDITION_ZH = {
    mint: '全新未拆', near_mint: '近全新', excellent: '優良', good: '良好', poor: '普通'
};
const GRADE_LABEL = {
    0: 'Raw', 9: 'PSA 9', 10: 'PSA 10', 8: 'PSA 8', 7: 'PSA 7', 6: 'PSA 6', 5: 'PSA 5'
};
const STATUS_LABEL = { active: '上架中', sold: '已售出', cancelled: '已取消', expired: '已過期' };
const STATUS_BADGE = { active: 'badge-status-active', sold: 'badge-status-sold', cancelled: 'badge-status-cancelled', expired: 'badge-status-expired' };

function getToken() { return localStorage.getItem('cp_token'); }

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.status-tab').forEach((el, i) => {
        el.classList.toggle('active', ['active','sold','ended'][i] === tab);
    });
    renderListings();
}

function filterListings(tab) {
    if (tab === 'active') return allListings.filter(l => l.status === 'active');
    if (tab === 'sold')   return allListings.filter(l => l.status === 'sold');
    return allListings.filter(l => l.status === 'cancelled' || l.status === 'expired');
}

function renderListings() {
    const list = filterListings(currentTab);
    const container = document.getElementById('listingList');
    container.style.display = '';
    document.getElementById('loading').style.display = 'none';

    if (!list.length) {
        container.innerHTML = `<div class="empty-state">
            <div class="icon">📭</div>
            <p>${currentTab === 'active' ? '目前沒有上架中的商品' : '沒有紀錄'}</p>
            ${currentTab === 'active' ? '<a href="/static/liff/listing.html">立即上架</a>' : ''}
        </div>`;
        return;
    }

    container.innerHTML = '';
    list.forEach(l => {
        const card = document.createElement('div');
        card.className = `listing-card ${l.status}`;

        const thumb = l.image_url
            ? `<img src="${l.image_url}" alt="${l.card_name || ''}">`
            : '🃏';

        const gradeLabel = GRADE_LABEL[l.grade] || `Grade ${l.grade}`;
        const condLabel = CONDITION_ZH[l.condition] || l.condition || '—';
        const statusLabel = STATUS_LABEL[l.status] || l.status;
        const statusBadge = STATUS_BADGE[l.status] || '';

        const expires = l.expires_at ? new Date(l.expires_at + 'Z').toLocaleDateString('zh-TW') : '—';
        const cardName = l.card_name || `${l.set_id} #${l.card_number}`;
        const setName = l.set_name || l.set_id;

        const actionBtn = l.status === 'active'
            ? `<button class="btn-cancel" onclick="cancelListing(${l.id}, this)">取消上架</button>`
            : `<button class="btn-delete" onclick="deleteRecord(${l.id}, this)">刪除紀錄</button>`;

        card.innerHTML = `
            <div class="listing-top">
                <div class="card-thumb">${thumb}</div>
                <div class="listing-info">
                    <div class="listing-name">${cardName}</div>
                    <div class="listing-sub">${setName} · #${l.card_number}</div>
                    <div class="listing-price">NT$ ${Number(l.ask_price_twd).toLocaleString()}</div>
                </div>
            </div>
            <div class="listing-badges">
                <span class="badge badge-grade">${gradeLabel}</span>
                <span class="badge badge-condition">${condLabel}</span>
                <span class="badge ${statusBadge}">${statusLabel}</span>
            </div>
            ${l.description ? `<div style="padding:0 14px 10px;font-size:.8rem;color:#666;">${l.description}</div>` : ''}
            <div class="listing-footer">
                <span class="expires-text">${l.status === 'active' ? '有效至 ' + expires : '掛單 #' + l.id}</span>
                ${actionBtn}
            </div>
        `;
        container.appendChild(card);
    });
}

async function cancelListing(id, btn) {
    if (!confirm('確定要取消這筆上架嗎？')) return;
    btn.disabled = true;
    btn.textContent = '取消中...';
    try {
        const r = await fetch(`${API}/api/listings/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (r.ok) {
            const item = allListings.find(l => l.id === id);
            if (item) item.status = 'cancelled';
            renderListings();
        } else {
            const d = await r.json();
            alert(d.detail || '取消失敗');
            btn.disabled = false;
            btn.textContent = '取消上架';
        }
    } catch(e) {
        alert('網路錯誤');
        btn.disabled = false;
        btn.textContent = '取消上架';
    }
}

async function deleteRecord(id, btn) {
    if (!confirm('確定要刪除這筆紀錄嗎？')) return;
    btn.disabled = true;
    try {
        const r = await fetch(`${API}/api/listings/${id}/record`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (r.ok) {
            allListings = allListings.filter(l => l.id !== id);
            renderListings();
        } else {
            const d = await r.json();
            alert(d.detail || '刪除失敗');
            btn.disabled = false;
        }
    } catch(e) {
        alert('網路錯誤');
        btn.disabled = false;
    }
}

async function init() {
    const token = getToken();
    if (!token) {
        document.getElementById('authWarn').style.display = '';
        return;
    }

    // Verify token
    const me = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': 'Bearer ' + token } });
    if (!me.ok) {
        localStorage.removeItem('cp_token');
        document.getElementById('authWarn').style.display = '';
        return;
    }

    document.getElementById('mainContent').style.display = '';

    try {
        const r = await fetch(`${API}/api/me/listings`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const d = await r.json();
        allListings = d.listings || [];
        renderListings();
    } catch(e) {
        document.getElementById('loading').textContent = '載入失敗：' + e.message;
    }
}

init();
</script>
</body>
</html>
