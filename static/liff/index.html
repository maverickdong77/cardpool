<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardpool | 寶可夢卡牌交易市場</title>
    <link rel="stylesheet" href="/static/liff/style.css?v=2">
    <style>
        /* ── Header ── */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 52px;
            box-shadow: 0 1px 0 rgba(0,0,0,.07);
        }
        .site-logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1a1a1a;
            letter-spacing: .5px;
            text-decoration: none;
        }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .btn-login {
            padding: 7px 16px;
            background: #be9682;
            border: none;
            border-radius: 20px;
            font-size: .85rem;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: .85; }
        .header-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #be9682;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            text-decoration: none;
        }

        /* ── Carousel ── */
        .carousel {
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .carousel-track {
            display: flex;
            transition: transform .45s cubic-bezier(.4,0,.2,1);
            will-change: transform;
        }
        .carousel-slide {
            flex: 0 0 100%;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .carousel-slide h2 {
            font-size: 1.5rem;
            font-weight: 800;
            text-shadow: 0 1px 4px rgba(0,0,0,.3);
            margin-bottom: 6px;
        }
        .carousel-slide p {
            font-size: .88rem;
            opacity: .9;
            text-shadow: 0 1px 3px rgba(0,0,0,.3);
        }
        .slide-1 {
            background: url('/static/liff/banner1.jpg') center/cover no-repeat;
        }
        .slide-1::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.25);
        }
        .slide-2 { background: linear-gradient(135deg, #6b8e6e 0%, #3a5e3a 100%); }
        .slide-3 { background: linear-gradient(135deg, #7a82be 0%, #3a3e8a 100%); }
        .slide-4 { background: linear-gradient(135deg, #be9e60 0%, #7a5e20 100%); }

        .carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }
        .carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,.5);
            cursor: pointer;
            transition: background .2s;
            border: none;
            padding: 0;
        }
        .carousel-dot.active { background: #fff; }

        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,.25);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }
        .carousel-arrow:hover { background: rgba(0,0,0,.45); }
        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }

        /* ── Sections ── */
        .section { padding: 16px; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 800;
            color: #1a1a1a;
        }
        .section-more {
            font-size: .8rem;
            color: #be9682;
            text-decoration: none;
            font-weight: 600;
        }

        /* ── Listings grid ── */
        .listings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .listing-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .listing-badge {
            display: inline-block;
            font-size: .7rem;
            font-weight: 700;
            background: #f0e8d8;
            color: #8a5a30;
            padding: 2px 8px;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 4px;
        }
        .listing-name {
            font-size: .85rem;
            font-weight: 700;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .listing-sub {
            font-size: .75rem;
            color: #888;
        }
        .listing-price {
            font-size: 1.05rem;
            font-weight: 800;
            color: #be9682;
            margin-top: 4px;
        }

        /* ── Trades list ── */
        .trades-list { display: flex; flex-direction: column; gap: 8px; }
        .trade-row {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .trade-info { display: flex; flex-direction: column; gap: 2px; }
        .trade-name { font-size: .88rem; font-weight: 700; color: #1a1a1a; }
        .trade-sub  { font-size: .75rem; color: #888; }
        .trade-price { font-size: .95rem; font-weight: 800; color: #2e7d32; }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 32px 20px;
            color: #bbb;
            font-size: .88rem;
        }
        .empty-state .icon { font-size: 2rem; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>
<div class="app">

    <!-- 置頂 Header -->
    <header class="site-header">
        <a href="/" class="site-logo">🃏 Cardpool</a>
        <div class="header-right">
            <a href="/static/liff/login.html" class="btn-login" id="headerLoginBtn">登入 / 註冊</a>
            <a href="/static/liff/settings.html" class="header-avatar" id="headerAvatar" style="display:none" title="個人設定">U</a>
        </div>
    </header>

    <!-- 輪播 Banner -->
    <div class="carousel" id="carousel"
         aria-label="最新消息輪播">
        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide slide-1"></div>
            <div class="carousel-slide slide-2">
                <h2>📊 即時市場行情</h2>
                <p>追蹤 PSA 10 成交價格<br>掌握每張卡的市場動態</p>
            </div>
            <div class="carousel-slide slide-3">
                <h2>📦 系列完整收錄</h2>
                <p>朱紫、MEGA、SV 系列<br>超過 21,000 張卡牌資料</p>
            </div>
            <div class="carousel-slide slide-4">
                <h2>✨ 安全媒合交易</h2>
                <p>掛買、掛賣自動撮合<br>即時收到成交通知</p>
            </div>
        </div>

        <div class="carousel-dots" id="carouselDots"></div>
        <button class="carousel-arrow carousel-prev" id="carouselPrev" aria-label="上一張">‹</button>
        <button class="carousel-arrow carousel-next" id="carouselNext" aria-label="下一張">›</button>
    </div>

    <!-- 最新上架 -->
    <section class="section">
        <div class="section-header">
            <span class="section-title">最新上架</span>
            <a href="/static/liff/sets.html" class="section-more">查看更多 ›</a>
        </div>
        <div class="listings-grid" id="listingsGrid">
            <div class="empty-state">
                <span class="icon">📭</span>
                載入中⋯
            </div>
        </div>
    </section>

    <!-- 最新成交 -->
    <section class="section" style="padding-top:0;">
        <div class="section-header">
            <span class="section-title">最新成交</span>
        </div>
        <div class="trades-list" id="tradesList">
            <div class="empty-state">
                <span class="icon">🔍</span>
                載入中⋯
            </div>
        </div>
    </section>

</div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? `${window.location.protocol}//${window.location.hostname}:8000`
  : 'https://cardpool.onrender.com';

/* ── Carousel ── */
(function() {
    const track = document.getElementById('carouselTrack');
    const dotsWrap = document.getElementById('carouselDots');
    const slides = track.children;
    const total = slides.length;
    let cur = 0;
    let timer;

    // build dots
    for (let i = 0; i < total; i++) {
        const d = document.createElement('button');
        d.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        d.setAttribute('aria-label', `第 ${i+1} 張`);
        d.addEventListener('click', () => goTo(i));
        dotsWrap.appendChild(d);
    }

    function goTo(n) {
        cur = (n + total) % total;
        track.style.transform = `translateX(-${cur * 100}%)`;
        dotsWrap.querySelectorAll('.carousel-dot').forEach((d, i) =>
            d.classList.toggle('active', i === cur));
        resetTimer();
    }

    function resetTimer() {
        clearInterval(timer);
        timer = setInterval(() => goTo(cur + 1), 3200);
    }

    document.getElementById('carouselPrev').addEventListener('click', () => goTo(cur - 1));
    document.getElementById('carouselNext').addEventListener('click', () => goTo(cur + 1));

    // touch swipe
    let tx = 0;
    const el = document.getElementById('carousel');
    el.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    el.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 40) goTo(cur + (dx < 0 ? 1 : -1));
    }, { passive: true });

    resetTimer();
})();

/* ── Auth header ── */
async function initHeader() {
    const token = localStorage.getItem('cp_token');
    if (!token) return;
    try {
        const r = await fetch(`${API}/api/auth/me`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!r.ok) { localStorage.removeItem('cp_token'); return; }
        const d = await r.json();
        const u = d.user;
        document.getElementById('headerLoginBtn').style.display = 'none';
        const av = document.getElementById('headerAvatar');
        av.style.display = 'flex';
        av.textContent = (u.display_name || u.email || 'U')[0].toUpperCase();
        av.title = u.display_name || u.email;
    } catch {}
}

/* ── 最新上架 ── */
async function loadListings() {
    const grid = document.getElementById('listingsGrid');
    try {
        const r = await fetch(`${API}/api/listings?limit=6`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        const items = d.listings || [];
        if (!items.length) {
            grid.innerHTML = `<div class="empty-state"><span class="icon">📭</span>目前尚無上架商品</div>`;
            return;
        }
        grid.innerHTML = items.map(l => `
            <div class="listing-card">
                <span class="listing-badge">PSA ${l.grade || '-'}</span>
                <div class="listing-name">${esc(l.set_id)} #${esc(l.card_number)}</div>
                <div class="listing-sub">${fmtDate(l.created_at)}</div>
                <div class="listing-price">NT$ ${Number(l.ask_price_twd).toLocaleString()}</div>
            </div>
        `).join('');
    } catch {
        grid.innerHTML = `<div class="empty-state"><span class="icon">📭</span>目前尚無上架商品</div>`;
    }
}

/* ── 最新成交 ── */
async function loadTrades() {
    const list = document.getElementById('tradesList');
    try {
        const r = await fetch(`${API}/api/trades/recent?limit=5`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        const items = d.trades || [];
        if (!items.length) {
            list.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>目前尚無成交紀錄</div>`;
            return;
        }
        list.innerHTML = items.map(t => `
            <div class="trade-row">
                <div class="trade-info">
                    <div class="trade-name">${esc(t.set_id)} #${esc(t.card_number)} PSA${t.grade}</div>
                    <div class="trade-sub">${fmtDate(t.created_at)}</div>
                </div>
                <div class="trade-price">NT$ ${Number(t.price_twd).toLocaleString()}</div>
            </div>
        `).join('');
    } catch {
        list.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>目前尚無成交紀錄</div>`;
    }
}

function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    const mo = d.getMonth() + 1;
    const da = d.getDate();
    return `${mo}/${da}`;
}

initHeader();
loadListings();
loadTrades();
</script>
<script src="/static/liff/nav.js"></script>
</body>
</html>
