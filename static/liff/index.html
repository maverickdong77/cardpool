<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardpool | PSA 卡片查價</title>
    <link rel="stylesheet" href="/static/liff/style.css?v=6">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <h1>Cardpool</h1>
            <p class="subtitle">Pokemon PSA 鑑定卡查價</p>
        </header>

        <!-- 語言切換 -->
        <div class="lang-tabs">
            <button class="lang-tab active" data-lang="search">搜尋</button>
            <button class="lang-tab" data-lang="jp">日文卡表</button>
            <button class="lang-tab" data-lang="en">英文卡表</button>
        </div>

        <!-- 分類入口 -->
        <div class="lang-tabs" style="margin-top:6px;">
            <a class="lang-tab" href="/pokemon" style="text-decoration:none;text-align:center;">寶可夢分類</a>
            <a class="lang-tab" href="/characters" style="text-decoration:none;text-align:center;">訓練家分類</a>
        </div>

        <!-- 搜尋區 -->
        <div id="searchSection" class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="輸入卡片名稱 (中/英/日) 或編號">
                <button id="searchBtn" class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <!-- 搜尋語言過濾 -->
            <div class="search-lang-filter">
                <span class="filter-label">語言：</span>
                <button class="search-lang-btn active" data-search-lang="">全部</button>
                <button class="search-lang-btn" data-search-lang="jp">日文</button>
                <button class="search-lang-btn" data-search-lang="en">英文</button>
            </div>
            <div class="quick-search">
                <button class="quick-btn" data-search="皮卡丘">皮卡丘</button>
                <button class="quick-btn" data-search="噴火龍">噴火龍</button>
                <button class="quick-btn" data-search="超夢">超夢</button>
                <button class="quick-btn" data-search="伊布">伊布</button>
                <button class="quick-btn" data-search="快龍">快龍</button>
                <button class="quick-btn" data-search="耿鬼">耿鬼</button>
            </div>
        </div>

        <!-- 系列標題 (卡表模式) -->
        <div id="setHeader" class="set-header hidden">
            <button id="backToSets" class="back-btn">&larr; 返回系列</button>
            <h2 id="setTitle"></h2>
        </div>

        <!-- 載入中 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>載入中...</p>
        </div>

        <!-- 系列網格 (卡表模式) -->
        <div id="setGrid" class="set-grid hidden">
            <!-- 系列會動態載入 -->
        </div>

        <!-- 卡片網格 -->
        <div id="cardGrid" class="card-grid hidden">
            <!-- 卡片會動態載入 -->
        </div>

        <!-- 空狀態 -->
        <div id="emptyState" class="empty-state">
            <p>輸入關鍵字搜尋卡片</p>
            <p class="hint">支援中文、英文、日文名稱，或卡片編號 (如: 皮卡丘 #227)</p>
        </div>

        <!-- 卡片詳情彈窗 -->
        <div id="cardModal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <div class="modal-card">
                    <img id="modalImage" src="" alt="Card">
                    <div class="modal-info">
                        <h3 id="modalTitle"></h3>
                        <p id="modalSubtitle" class="modal-subtitle"></p>
                        <p id="modalPrice" class="modal-price"></p>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="viewDataBtn" class="action-btn primary">
                        查詢價格
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 17L17 7M17 7H7M17 7V17"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 確認彈窗 -->
        <div id="confirmModal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content confirm-modal">
                <img id="confirmImage" src="" alt="Card" class="confirm-image">
                <p class="confirm-text">已查詢完成</p>
                <button id="confirmBtn" class="confirm-btn">確定</button>
            </div>
        </div>
    </div>

    <script src="/static/liff/app.js?v=10"></script>
</body>
</html>
