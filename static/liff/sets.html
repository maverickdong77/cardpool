<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardpool | 系列列表</title>
    <link rel="stylesheet" href="/static/liff/style.css">
    <style>
        .tabs-container {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .lang-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            font-size: 14px;
            cursor: pointer;
        }
        .lang-tab.active {
            background: #be9682;
            font-weight: bold;
        }
        .sets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 12px;
        }
        .set-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .set-card:hover {
            transform: scale(1.02);
        }
        .set-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #f5f5f5;
        }
        .set-info {
            padding: 8px;
        }
        .set-name {
            font-size: 12px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a1a1a;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 32px;
        }
        .set-name-zh {
            font-size: 11px;
            color: #666;
            line-height: 1.25;
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .set-meta {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .back-link {
            display: block;
            padding: 12px;
            text-align: center;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>卡片系列</h1>
            <a href="/" class="home-btn" title="回首頁">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-7H10v7H6a2 2 0 0 1-2-2V9z"/></svg>
                首頁
            </a>
        </header>

        <div class="tabs-container">
            <button class="lang-tab active" data-lang="jp">日文</button>
            <button class="lang-tab" data-lang="en">英文</button>
            <button class="lang-tab" data-lang="zh">中文</button>
        </div>

        <div id="loading" class="loading">載入中...</div>

        <div id="setsGrid" class="sets-grid" style="display:none;"></div>

        <a href="/static/liff/test-search.html" class="back-link">返回搜尋</a>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentLang = 'jp';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadSets('jp');

            // 語言切換
            document.querySelectorAll('.lang-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentLang = tab.dataset.lang;
                    loadSets(currentLang);
                });
            });
        });

        async function loadSets(lang) {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('setsGrid');

            loading.style.display = 'block';
            grid.style.display = 'none';

            try {
                let sets = [];

                if (lang === 'jp' || lang === 'en') {
                    // 使用靜態卡表（本地 demo 無 jp_card_list_set DB）
                    const response = await fetch(`${API_BASE}/api/sets/${lang}`, {
                        headers: { 'ngrok-skip-browser-warning': '1' }
                    });
                    const data = await response.json();
                    sets = data.sets || [];
                } else {
                    // 中文等其他：原本的 API
                    const response = await fetch(`${API_BASE}/api/sets/${lang}`, {
                        headers: { 'ngrok-skip-browser-warning': '1' }
                    });
                    const data = await response.json();
                    sets = data.sets || [];
                }

                loading.style.display = 'none';
                grid.style.display = 'grid';

                renderSets(sets);
            } catch (error) {
                loading.textContent = '載入失敗: ' + error.message;
            }
        }

        function renderSets(sets) {
            const grid = document.getElementById('setsGrid');
            grid.innerHTML = '';

            if (sets.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#999;">尚無資料</div>';
                return;
            }

            sets.forEach(set => {
                const card = document.createElement('div');
                card.className = 'set-card';

                // 主名稱：JP 卡 → 日文，EN 卡 → 英文；副標：中文
                const setId = set.set_id || set.id || '';
                const isJp = setId.startsWith('jp-');
                const primary = (isJp ? set.name_jp : set.name) || set.name || set.name_jp || setId;
                const zh = set.name_zh && set.name_zh !== primary ? set.name_zh : null;
                const totalCards = set.total_cards || '?';

                let imageUrl = set.logo_url || set.logo || set.symbol;
                if (!imageUrl) {
                    imageUrl = `https://via.placeholder.com/150?text=${encodeURIComponent(setId)}`;
                }

                const altText = primary + (zh ? ` (${zh})` : '');
                card.innerHTML = `
                    <img src="${imageUrl}" alt="${altText}" onerror="this.onerror=null;this.src='https://via.placeholder.com/150?text=${encodeURIComponent(setId)}'">
                    <div class="set-info">
                        <div class="set-name">${primary}</div>
                        ${zh ? `<div class="set-name-zh">(${zh})</div>` : ''}
                        <div class="set-meta">${totalCards} 張</div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    // 儲存系列資訊後跳轉
                    set.language = currentLang;
                    localStorage.setItem('selectedSet', JSON.stringify(set));
                    window.location.href = `/static/liff/set-cards.html?id=${setId}&lang=${currentLang}`;
                });

                grid.appendChild(card);
            });
        }
    </script>
<script src="/static/liff/nav.js"></script>
</body>
</html>
